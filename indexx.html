<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; img-src * data: blob:; connect-src *; font-src *;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АВТОРИЗАЦИЯ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #4c1d95 0%, #8b5cf6 50%, #a78bfa 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .form {
      width: 360px;
      background: rgba(15, 15, 23, 0.9);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 24px;
      border: 1px solid rgba(139, 92, 246, 0.3);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.5s ease-out;
    }
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    h1 {
      color: #a78bfa;
      font-size: 32px;
      margin-bottom: 30px;
      text-align: center;
      letter-spacing: 2px;
      font-weight: 600;
      position: relative;
      padding-bottom: 15px;
    }
    h1::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #8b5cf6, transparent);
      border-radius: 2px;
    }
    input {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 14px 16px;
      width: 100%;
      border-radius: 12px;
      color: white;
      margin: 8px 0 16px 0;
      box-sizing: border-box;
      font-size: 15px;
      transition: all 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
      background: #2d3748;
    }
    input:hover {
      border-color: #a78bfa;
      background: #2d3748;
    }
    .btn-login {
      width: 56px;
      height: 56px;
      margin: 20px auto 25px;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.4);
    }
    .btn-login:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 20px 25px -5px rgba(139, 92, 246, 0.6);
    }
    .btn-login:active {
      transform: translateY(0);
    }
    .forgot-password {
      text-align: right;
      margin: 8px 0;
    }
    .link {
      color: #a78bfa;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }
    .link:hover {
      color: #8b5cf6;
      text-decoration: underline;
    }
    .register-link {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      margin-top: 20px;
    }
    .error-message {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid rgba(239, 68, 68, 0.3);
      display: none;
    }
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="form">
    <h1>АВТОРИЗАЦИЯ</h1>
    
    <div class="error-message" id="errorMessage"></div>
    
    <input type="email" name="email" placeholder="E-mail" id="email">
    
    <input type="password" name="password" placeholder="Пароль" id="password">
    
    <div class="forgot-password">
      <a href="#" class="link" onclick="alert('Восстановление пароля временно недоступно')">Забыли пароль?</a>
    </div>
    
    <button class="btn-login" onclick="handleLogin()" id="loginBtn">→</button>
    
    <div class="register-link">
      Нет аккаунта? <a href="registration.html" class="link">Зарегистрироваться</a>
    </div>
  </div>

  <script>
    async function handleLogin() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('errorMessage');
  const loginBtn = document.getElementById('loginBtn');

  if (!email || !password) {
    showError('Пожалуйста, заполните все поля');
    return;
  }

  const originalText = loginBtn.innerHTML;
  loginBtn.innerHTML = '<span class="loading"></span>';
  loginBtn.disabled = true;
  errorDiv.style.display = 'none';

  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (response.ok) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      
      console.log('✅ Вход выполнен. Роль:', data.user.role);
      
      switch(data.user.role) {
        case 'owner':
          window.location.href = 'Owner.html';
          break;
        case 'staff':
          window.location.href = 'login.html'; 
          break;
        case 'customer':
          window.location.href = 'client.html';
          break;
        default:
          window.location.href = 'client.html';
      }
    } else {
      showError(data.error || 'Ошибка входа');
      loginBtn.innerHTML = originalText;
      loginBtn.disabled = false;
    }
  } catch (error) {
    console.error('Ошибка:', error);
    showError('Ошибка подключения к серверу');
    loginBtn.innerHTML = originalText;
    loginBtn.disabled = false;
  }
}

function showError(message) {
  const errorDiv = document.getElementById('errorMessage');
  errorDiv.textContent = message;
  errorDiv.style.display = 'block';
  
  setTimeout(() => {
    errorDiv.style.display = 'none';
  }, 5000);
}
  </script>
</body>
</html>
